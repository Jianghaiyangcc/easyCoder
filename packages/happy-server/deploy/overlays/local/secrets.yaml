apiVersion: v1
kind: Secret
metadata:
  name: handy-secrets
type: Opaque
stringData:
  DATABASE_URL: postgresql://happy:happy@happy-postgres:5432/happy
  HANDY_MASTER_SECRET: local-dev-secret-not-for-production
  S3_HOST: happy-minio
  S3_PORT: "9000"
  S3_USE_SSL: "false"
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET: happy
  DASHSCOPE_API_KEY: your-dashscope-api-key
  DASHSCOPE_API_BASE_URL: https://dashscope.aliyuncs.com/api/v1
  DASHSCOPE_ASR_MODEL: qwen3-asr-flash
  DASHSCOPE_TTS_MODEL: qwen3-tts-flash
  DASHSCOPE_TTS_VOICE: Cherry
