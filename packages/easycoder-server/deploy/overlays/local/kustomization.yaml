apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - postgres.yaml
  - minio.yaml
  - secrets.yaml
  - prometheus.yaml
  - grafana.yaml

# Use locally-built image instead of private registry
images:
  - name: docker.korshakov.com/easycoder-server
    newName: easycoder-server
    newTag: local

# Patches: minimal local-only overrides (replicas match prod)
patches:
  # Point S3_PUBLIC_URL at local MinIO instead of prod
  - target:
      kind: Deployment
      name: easycoder-server
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: easycoder-server
      spec:
        template:
          spec:
            containers:
            - name: easycoder-server
              env:
              - name: S3_PUBLIC_URL
                value: http://localhost:9000/happy

  # NodePort so tests connect through kube-proxy (real load balancing).
  # kubectl port-forward tunnels to ONE pod — when that pod dies,
  # ALL connections through it break. NodePort uses iptables rules
  # that survive pod kills and route to healthy pods.
  - target:
      kind: Service
      name: easycoder-server
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: easycoder-server
      spec:
        type: NodePort

  # Remove ExternalSecret — we use plain Secret instead
  - target:
      kind: ExternalSecret
      name: easycoder-server-secrets
    patch: |-
      $patch: delete
      apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      metadata:
        name: easycoder-server-secrets
